<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2 Interactive Page</title>
</head>
<body>
    <h1>Step 2: Interactive Tools</h1>
    <section>
        <h2>ROI Calculator</h2>
        <p>Use our ROI calculator to evaluate your investment.</p>
        <form>
            <label for="investment">Investment:</label>
            <input type="number" id="investment" name="investment" required>
            <label for="return">Return:</label>
            <input type="number" id="return" name="return" required>
            <input type="submit" value="Calculate ROI">
        </form>
    </section>
    <section>
        <h2>Ad Copy Generator</h2>
        <p>Generate effective ad copy with our tool.</p>
        <button onclick="generateAdCopy()">Generate Ad Copy</button>
        <p id="adCopy"></p>
    </section>
    <section>
        <h2>Join Our Community</h2>
        <p>Connect with others in the community.</p>
        <a href="#">Join Now</a>
    </section>
    <nav>
        <a href="../1/">Go to Step 1</a>
        <a href="../3/">Go to Step 3</a>
    </nav>
    <script>
        function generateAdCopy() {
            document.getElementById('adCopy').innerText = 'Your ad copy will be generated here.';
        }
    </script>
</body>
</html>
